﻿﻿﻿﻿﻿<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DUNK Призы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--red:#b10612;--deep:#73000a;--white:#fff7f4;--soft:rgba(255,247,244,.72)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;overflow:hidden}body{font-family:"Space Grotesk",sans-serif;color:var(--white);background:radial-gradient(circle at top,rgba(255,247,244,.16),transparent 32%),linear-gradient(180deg,#c30818 0%,var(--red) 48%,var(--deep) 100%)}
    .app{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:0}.stage{position:relative;width:100%;max-width:28rem;min-height:100vh;min-height:100dvh;padding:max(1rem,env(safe-area-inset-top)) .95rem max(1rem,env(safe-area-inset-bottom));display:grid;grid-template-rows:auto 1fr;overflow:hidden;background:linear-gradient(180deg,rgba(255,247,244,.08),rgba(255,247,244,.02));border-inline:1px solid rgba(255,247,244,.12)}
    .top{z-index:5;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}.brand{display:inline-flex;align-items:center;min-height:2.1rem;padding:0 .85rem;border-radius:999px;border:1px solid rgba(255,247,244,.22);background:rgba(255,247,244,.08);font-size:.76rem;font-weight:700;letter-spacing:.22em}.hint{max-width:10rem;margin:0;text-align:right;color:var(--soft);font-size:.72rem;line-height:1.35}
    .scene{position:relative;min-height:0;perspective:1100px}.ring{position:absolute;left:50%;top:50%;border:1px solid rgba(255,247,244,.11);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}.ring.big{width:min(22rem,82vw);height:min(22rem,82vw)}.ring.small{width:min(15.5rem,59vw);height:min(15.5rem,59vw)}
    .token{--x:0px;--y:0px;--s:1;--r:0deg;--o:1;--b:0px;--z:0;position:absolute;left:50%;top:50%;z-index:var(--z);display:flex;align-items:center;justify-content:center;min-height:2.5rem;max-width:min(42vw,11rem);padding:.66rem .9rem;border-radius:999px;background:rgba(255,247,244,.96);color:var(--red);font-size:.78rem;font-weight:700;line-height:1.05;text-align:center;box-shadow:0 1rem 2rem rgba(90,0,9,.18);opacity:var(--o);filter:blur(var(--b));transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),0) scale(var(--s)) rotate(var(--r));will-change:transform,opacity,filter}.token.selected{box-shadow:0 2rem 4rem rgba(90,0,9,.38),0 0 2rem rgba(255,247,244,.22)}
    .center{position:absolute;left:50%;top:50%;z-index:12;display:grid;justify-items:center;gap:.7rem;transform:translate(-50%,-50%);transition:transform .7s cubic-bezier(.2,.9,.18,1),opacity .7s}.logo{position:relative;width:clamp(8.5rem,43vw,10.8rem);aspect-ratio:1;border:0;border-radius:50%;background:transparent;padding:0;color:var(--white);cursor:pointer;touch-action:manipulation}.logo:before,.logo:after,.core{content:"";position:absolute;inset:0;border-radius:50%}.logo:before{border:1px solid rgba(255,247,244,.16);background:radial-gradient(circle at 30% 30%,rgba(255,247,244,.18),transparent 62%);box-shadow:0 1rem 4rem rgba(66,0,7,.28)}.logo:after{inset:.92rem;border:1px solid rgba(255,247,244,.28)}.core{inset:1rem;display:grid;place-items:center;background:rgba(255,247,244,.025);box-shadow:inset 0 0 2rem rgba(255,247,244,.12);backdrop-filter:blur(14px)}.word{font-size:1.72rem;font-weight:700;letter-spacing:.16em;padding-left:.16em}.helper{margin:0;max-width:11rem;color:var(--soft);font-size:.7rem;text-transform:uppercase;text-align:center;line-height:1.25}
    .claim{position:absolute;left:50%;bottom:0;z-index:80;display:grid;justify-items:center;gap:.8rem;width:min(100%,20rem);padding:1rem;border:1px solid rgba(255,247,244,.18);border-radius:1.5rem;background:linear-gradient(180deg,rgba(255,247,244,.14),rgba(255,247,244,.05)),rgba(114,0,10,.38);box-shadow:0 1.5rem 4rem rgba(61,0,7,.34);backdrop-filter:blur(22px);transform:translate(-50%,1.2rem) scale(.94);opacity:0;pointer-events:none;transition:transform .52s cubic-bezier(.16,1,.3,1),opacity .32s}.claim[hidden]{display:none}.claim h2{margin:0;color:var(--white);font-size:1.55rem;line-height:1.05}.kicker,.code,.copy,.note{margin:0;color:var(--soft);text-align:center}.kicker{font-size:.68rem;text-transform:uppercase;letter-spacing:.16em}.code{font-size:.92rem;font-weight:700;letter-spacing:.12em}.note{max-width:15rem;font-size:.72rem;line-height:1.35}.copy{max-width:16rem;font-size:.76rem;line-height:1.35}.qrbox{position:relative;z-index:2;display:grid;place-items:center;width:10.5rem;height:10.5rem;padding:.8rem;border-radius:1.35rem;background:rgba(255,247,244,.96)}canvas{width:100%;height:auto}.actions{display:grid;width:100%;gap:.55rem}.btn{display:flex;align-items:center;justify-content:center;min-height:3rem;border:1px solid rgba(255,247,244,.16);border-radius:999px;background:rgba(255,247,244,.08);color:var(--white);font:inherit;font-weight:700}
    .scene.result .center{transform:translate(-50%,-50%) translateY(-6rem) scale(.66);opacity:.26}.scene.result .claim{transform:translate(-50%,0) scale(1);opacity:1;pointer-events:auto}@media(max-height:760px){.claim{gap:.65rem}.qrbox{width:9.4rem;height:9.4rem}.hint,.helper{font-size:.66rem}}
  </style>
</head>
<body>
  <main class="app"><section class="stage"><header class="top"><span class="brand">DUNK</span><p class="hint" id="hint">Нажми на логотип и забери свой приз.</p></header><section class="scene" id="scene"><div class="ring big"></div><div class="ring small"></div><div id="tokens"></div><div class="center"><button class="logo" id="spin" type="button" aria-label="Запустить розыгрыш"><span class="core"><span class="word">DUNK</span></span></button><p class="helper" id="helper">Нажми, чтобы крутить</p></div><section class="claim" id="claim" hidden><p class="kicker">Ваш выигрыш</p><h2 id="claimPrize">Коктейль</h2><p class="code" id="claimCode">DUNK-000000</p><p class="note">Гость сканирует QR своим телефоном. На его телефоне откроется купон с номером и призом.</p><div class="qrbox"><canvas id="qr" width="170" height="170"></canvas></div><p class="copy">Покажите QR гостю. После сканирования у него откроется купон для скриншота.</p><div class="actions"><button class="btn" id="again" type="button">Крутить снова</button></div></section></section></section></main>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <script>
    const prizes=[{label:"Коктейль",weight:24},{label:"Чай",weight:24},{label:"Пиво",weight:17},{label:"Десерт",weight:15},{label:"20% скидка",weight:10},{label:"50% на кальян",weight:5},{label:"Кальян",weight:5}];
    const scene=document.getElementById('scene'),tokenLayer=document.getElementById('tokens'),spin=document.getElementById('spin'),helper=document.getElementById('helper'),hint=document.getElementById('hint'),claim=document.getElementById('claim'),claimPrize=document.getElementById('claimPrize'),claimCode=document.getElementById('claimCode'),qrCanvas=document.getElementById('qr'),again=document.getElementById('again');
    const qr=new QRious({element:qrCanvas,size:170,level:'H',foreground:'#b10612',background:'#fff7f4',padding:10,value:location.href});
    const state={mode:'idle',speed:.2,target:.2,selected:0,last:0,boost:0,settle:0,current:null,img:''};
    let audioCtx=null,spinOsc=null,spinAmp=null,spinFilt=null,lastPulse=0,tickFlip=false;
    const tokens=prizes.map((p,i)=>{const el=document.createElement('div');el.className='token';el.textContent=p.label;tokenLayer.appendChild(el);return{el,i,angle:Math.PI*2*i/prizes.length,phase:i*.9,tilt:i%2?-6:6,rx:0,ry:0,bob:0}});
    function pick(){let t=Math.random()*prizes.reduce((s,p)=>s+p.weight,0);for(let i=0;i<prizes.length;i++){t-=prizes[i].weight;if(t<0)return i}return prizes.length-1}
    function enc(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
    function fileName(c){return `${c.prize.replace(/[<>:"/\\|?*\u0000-\u001F]/g,'').trim()||'prize'}-${c.code}.png`}
    function claimUrl(c){const u=new URL('claim.html',location.href);u.hash='claim='+enc(c);return u.href}
    function code(){const n=crypto.getRandomValues(new Uint32Array(1))[0]%1000000;return 'DUNK-'+String(n).padStart(6,'0')}
    function ctx(){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;if(!audioCtx)audioCtx=new C;if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});return audioCtx}
    function tone(f,d,o={}){const c=ctx();if(!c)return;const s=c.currentTime+(o.delay||0),osc=c.createOscillator(),amp=c.createGain(),to=o.slideTo||f;osc.type=o.type||'sine';osc.frequency.setValueAtTime(f,s);osc.frequency.exponentialRampToValueAtTime(Math.max(1,to),s+d);amp.gain.setValueAtTime(.0001,s);amp.gain.exponentialRampToValueAtTime(o.gain||.06,s+.015);amp.gain.exponentialRampToValueAtTime(.0001,s+d);osc.connect(amp).connect(c.destination);osc.start(s);osc.stop(s+d+.04)}
    function wheelTick(i=1){tickFlip=!tickFlip;const h=tickFlip?980:1240,l=tickFlip?420:520,g=Math.min(.032,Math.max(.012,.012+i*.018));tone(h,.026,{type:'square',gain:g,slideTo:h*.68});tone(l,.045,{type:'triangle',gain:g*.42,delay:.006,slideTo:l*.9})}
    function stopSpinSound(){if(!audioCtx||!spinOsc||!spinAmp){spinOsc=null;spinAmp=null;spinFilt=null;return}const n=audioCtx.currentTime;spinAmp.gain.cancelScheduledValues(n);spinAmp.gain.setTargetAtTime(.0001,n,.08);spinOsc.stop(n+.28);spinOsc=null;spinAmp=null;spinFilt=null}
    function startSpinSound(){const c=ctx();if(!c)return;stopSpinSound();spinOsc=c.createOscillator();spinFilt=c.createBiquadFilter();spinAmp=c.createGain();spinOsc.type='sawtooth';spinOsc.frequency.setValueAtTime(118,c.currentTime);spinFilt.type='lowpass';spinFilt.frequency.setValueAtTime(860,c.currentTime);spinAmp.gain.setValueAtTime(.0001,c.currentTime);spinAmp.gain.exponentialRampToValueAtTime(.026,c.currentTime+.12);spinOsc.connect(spinFilt).connect(spinAmp).connect(c.destination);spinOsc.start()}
    function updateSpinSound(now){if(!audioCtx||!spinOsc||!spinAmp||!spinFilt)return;const t=audioCtx.currentTime,f=Math.min(310,Math.max(118,118+state.speed*24)),g=Math.min(.038,Math.max(.01,.01+state.speed*.0032));spinOsc.frequency.setTargetAtTime(f,t,.08);spinFilt.frequency.setTargetAtTime(860+state.speed*150,t,.08);spinAmp.gain.setTargetAtTime(g,t,.08);const ti=state.mode==='settling'?Math.min(132,Math.max(82,132-state.speed*16)):Math.min(112,Math.max(52,124-state.speed*8.5));if(now-lastPulse>ti){lastPulse=now;wheelTick(Math.min(1.2,Math.max(.55,state.speed/6.5)))}}
    function startSound(){wheelTick(1.1);tone(220,.07,{type:'square',gain:.04,delay:.035,slideTo:330});tone(440,.08,{type:'triangle',gain:.03,delay:.085,slideTo:620})}
    function settleSound(){wheelTick(.9);tone(280,.12,{type:'triangle',gain:.03,delay:.03,slideTo:205})}
    function winSound(){stopSpinSound();tone(392,.12,{type:'triangle',gain:.055,slideTo:494});tone(587,.16,{type:'sine',gain:.06,delay:.08,slideTo:740});tone(988,.22,{type:'sine',gain:.04,delay:.18,slideTo:1175})}
    function resetSound(){tone(210,.07,{type:'triangle',gain:.035,slideTo:150})}
    function layout(){const r=scene.getBoundingClientRect(),m=Math.min(r.width,r.height),compact=r.width<390;tokens.forEach((t,i)=>{t.rx=m*(compact?.34:.37)*(i%2? .88:1);t.ry=m*(compact?.26:.285)*(i%2? .84:1);t.bob=m*(compact?.034:.042)+(i%3)*4})}
    function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
    function makeImage(c){const canvas=document.createElement('canvas');canvas.width=1080;canvas.height=1920;const ctx=canvas.getContext('2d'),g=ctx.createLinearGradient(0,0,0,1920);g.addColorStop(0,'#c30818');g.addColorStop(.55,'#b10612');g.addColorStop(1,'#73000a');ctx.fillStyle=g;ctx.fillRect(0,0,1080,1920);ctx.strokeStyle='rgba(255,247,244,.18)';ctx.lineWidth=3;round(ctx,76,76,928,1768,56);ctx.stroke();ctx.textAlign='center';ctx.fillStyle='#fff7f4';ctx.font="700 86px 'Space Grotesk',sans-serif";ctx.fillText('DUNK',540,254);ctx.fillStyle='rgba(255,247,244,.96)';round(ctx,136,474,808,866,56);ctx.fill();ctx.fillStyle='#b10612';ctx.font="700 88px 'Space Grotesk',sans-serif";ctx.fillText(c.prize,540,654);ctx.fillStyle='rgba(177,6,18,.72)';ctx.font="600 38px 'Space Grotesk',sans-serif";ctx.fillText(c.code,540,744);ctx.font="500 34px 'Space Grotesk',sans-serif";ctx.fillText('Покажите эту карточку',540,920);ctx.fillText('сотруднику бара',540,972);ctx.fillStyle='#fff7f4';round(ctx,232,1088,616,116,58);ctx.fill();ctx.fillStyle='#b10612';ctx.font="700 48px 'Space Grotesk',sans-serif";ctx.fillText('DUNK',540,1162);return canvas.toDataURL('image/png')}
    async function showClaim(c){state.current=c;claim.hidden=false;claimPrize.textContent=c.prize;claimCode.textContent=c.code;claim.dataset.claimUrl=c.url;qr.value=c.url;state.img=makeImage(c)}
    function reset(){resetSound();stopSpinSound();scene.classList.remove('result');claim.hidden=true;hint.textContent='Нажми на логотип и забери свой приз.';helper.textContent='Нажми, чтобы крутить';state.mode='idle';state.speed=.2;state.target=.2;state.current=null;state.img=''}
    function start(){startSound();startSpinSound();lastPulse=performance.now();claim.hidden=true;scene.classList.remove('result');state.selected=pick();state.mode='spinning';state.boost=performance.now();state.target=7.5;state.speed=Math.max(state.speed,1.9);state.last=0;helper.textContent='Крутим';hint.textContent='Крутим розыгрыш...'}
    function tick(now){if(!state.last)state.last=now;const d=Math.min((now-state.last)/1000,.032),off=-Math.min(scene.clientHeight*.04,18);state.last=now;if(state.mode==='spinning'){state.speed+=(state.target-state.speed)*.08;updateSpinSound(now);if(now-state.boost>2100){state.mode='settling';state.settle=now;helper.textContent='Фиксируем приз';settleSound()}}else if(state.mode==='settling'){const p=Math.min((now-state.settle)/1800,1),e=p>=1?1:1-2**(-10*p);state.target=2.5*(1-e)+.2;state.speed+=(state.target-state.speed)*.06;updateSpinSound(now);if(p>=1){state.mode='result';state.speed=.04;state.target=.04;scene.classList.add('result');helper.textContent='Приз подтвержден';hint.textContent='Покажите QR гостю. Он отсканирует его своим телефоном.';const c={code:code(),prize:prizes[state.selected].label,issuedAt:new Date().toISOString()};c.url=claimUrl(c);showClaim(c);winSound()}}else state.speed+=(state.target-state.speed)*.05;tokens.forEach((t,i)=>{t.angle+=d*state.speed;const depth=(Math.cos(t.angle+t.phase*.1)+1)/2,x=Math.cos(t.angle+t.phase*.03)*t.rx,y=Math.sin(t.angle*1.14+t.phase*.04)*t.ry+Math.sin(now*.0007+t.phase)*t.bob*.2;let tx=x,ty=y+off,s=.72+depth*.42,b=(1-depth)*1.4+Math.min(state.speed*(state.mode==='spinning'?4.2:state.mode==='settling'?1.8:.18),10),o=.24+depth*.76,z=Math.round(depth*100);if(state.mode==='result'&&i===state.selected){const p=Math.min((now-state.settle-1800)/850,1),e=p>=1?1:1-2**(-10*p);tx=x*(1-e);ty=y*(1-e)-6*e;s+=.7*e;b*=1-e;o=1;z=24}else if(state.mode==='result'){o*=.16;b+=4;s*=.9;z=10}t.el.classList.toggle('selected',state.mode==='result'&&i===state.selected);t.el.style.cssText+=`;--x:${tx}px;--y:${ty}px;--s:${s.toFixed(3)};--r:${(t.tilt+Math.sin(now*.0012+i)*3.5).toFixed(2)}deg;--o:${o.toFixed(3)};--b:${b.toFixed(2)}px;--z:${z}`});requestAnimationFrame(tick)}
    new ResizeObserver(layout).observe(scene);layout();spin.addEventListener('click',start);again.addEventListener('click',reset);requestAnimationFrame(tick);
  </script>
</body>
</html>
