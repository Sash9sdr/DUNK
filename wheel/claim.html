<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DUNK Купон</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--red:#b10612;--deep:#73000a;--white:#fff7f4;--soft:rgba(255,247,244,.76)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%}body{font-family:"Space Grotesk",sans-serif;color:var(--white);background:radial-gradient(circle at top,rgba(255,247,244,.15),transparent 30%),linear-gradient(180deg,#c30818 0%,var(--red) 45%,var(--deep) 100%)}main{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:max(1rem,env(safe-area-inset-top)) 1rem max(1rem,env(safe-area-inset-bottom))}.sheet{width:min(100%,24rem);display:grid;gap:1rem;padding:1.2rem;border-radius:1.8rem;border:1px solid rgba(255,247,244,.18);background:linear-gradient(180deg,rgba(255,247,244,.12),rgba(255,247,244,.04)),rgba(114,0,10,.28);box-shadow:0 1.5rem 4rem rgba(61,0,7,.34);backdrop-filter:blur(22px)}.brand{font-size:.78rem;font-weight:700;letter-spacing:.22em}.title{margin:0;font-size:1.9rem;line-height:1.04}.sub,.status{margin:0;color:var(--soft);line-height:1.4}.preview-wrap{display:grid;place-items:center;padding:.3rem 0}.preview{width:100%;max-width:17rem;border-radius:1.4rem;border:1px solid rgba(255,247,244,.16);box-shadow:0 1rem 2rem rgba(85,0,9,.25);background:rgba(255,247,244,.96)}.actions{display:grid;gap:.6rem}.button{display:inline-flex;justify-content:center;align-items:center;min-height:3rem;padding:.85rem 1rem;border-radius:999px;border:1px solid rgba(255,247,244,.18);background:rgba(255,247,244,.96);color:var(--red);font:inherit;font-weight:700;text-decoration:none;cursor:pointer}.button-secondary{background:rgba(255,247,244,.08);color:var(--white)}
  </style>
</head>
<body>
  <main><section class="sheet"><div class="brand">DUNK</div><div><h1 class="title" id="title">Готовим ваш приз</h1><p class="sub" id="subtitle">Картинка начнет скачиваться автоматически.</p></div><p class="sub" id="screenHint">Можно показать этот экран сотруднику бара или сделать скриншот.</p><div class="preview-wrap"><img class="preview" id="preview" alt="Карточка выигрыша"></div><p class="status" id="status">Если скачивание не началось, нажмите кнопку ниже.</p><div class="actions"><button class="button" id="download" type="button">Скачать картинку</button><a class="button button-secondary" href="./">Вернуться в DUNK</a></div></section></main>
  <script>
    const title=document.getElementById('title'),subtitle=document.getElementById('subtitle'),hint=document.getElementById('screenHint'),statusText=document.getElementById('status'),preview=document.getElementById('preview'),download=document.getElementById('download');let blobUrl='',fileName='dunk-prize.png',started=false;
    function dec(s){try{const n=s.replace(/-/g,'+').replace(/_/g,'/'),p=n.padEnd(Math.ceil(n.length/4)*4,'=');return JSON.parse(decodeURIComponent(escape(atob(p))))}catch{return null}}
    function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
    function card(c){const canvas=document.createElement('canvas');canvas.width=1080;canvas.height=1920;const ctx=canvas.getContext('2d'),g=ctx.createLinearGradient(0,0,0,1920);g.addColorStop(0,'#c30818');g.addColorStop(.55,'#b10612');g.addColorStop(1,'#73000a');ctx.fillStyle=g;ctx.fillRect(0,0,1080,1920);ctx.strokeStyle='rgba(255,247,244,.18)';ctx.lineWidth=3;round(ctx,76,76,928,1768,56);ctx.stroke();ctx.textAlign='center';ctx.fillStyle='#fff7f4';ctx.font="700 86px 'Space Grotesk',sans-serif";ctx.fillText('DUNK',540,254);ctx.fillStyle='rgba(255,247,244,.74)';ctx.font="500 34px 'Space Grotesk',sans-serif";ctx.fillText('Карточка выигрыша',540,328);ctx.fillStyle='rgba(255,247,244,.96)';round(ctx,136,474,808,866,56);ctx.fill();ctx.fillStyle='#b10612';ctx.font="700 88px 'Space Grotesk',sans-serif";ctx.fillText(c.prize,540,654);ctx.fillStyle='rgba(177,6,18,.72)';ctx.font="600 38px 'Space Grotesk',sans-serif";ctx.fillText(c.code,540,744);ctx.font="500 34px 'Space Grotesk',sans-serif";ctx.fillText('Покажите эту карточку',540,920);ctx.fillText('сотруднику бара',540,972);ctx.fillStyle='#fff7f4';round(ctx,232,1088,616,116,58);ctx.fill();ctx.fillStyle='#b10612';ctx.font="700 48px 'Space Grotesk',sans-serif";ctx.fillText('DUNK',540,1162);return new Promise(res=>canvas.toBlob(res,'image/png'))}
    function safeName(c){const p=(c.prize||'prize').replace(/[<>:"/\\|?*\u0000-\u001F]/g,'').trim()||'prize';return `${p}-${c.code}.png`}
    function trigger(){if(!blobUrl)return;started=true;const a=document.createElement('a');a.href=blobUrl;a.download=fileName;a.rel='noopener';document.body.appendChild(a);a.click();a.remove()}
    async function boot(){if(!location.hash.startsWith('#claim=')){title.textContent='Ссылка недействительна';subtitle.textContent='Не удалось прочитать данные выигрыша.';statusText.textContent='Вернитесь в приложение и сгенерируйте новый QR-код.';download.disabled=true;return}const c=dec(location.hash.replace('#claim=',''));if(!c?.code||!c?.prize){title.textContent='Ссылка недействительна';subtitle.textContent='Не удалось прочитать данные выигрыша.';statusText.textContent='Вернитесь в приложение и сгенерируйте новый QR-код.';download.disabled=true;return}title.textContent=c.prize;subtitle.textContent=c.code;hint.textContent='Можно показать этот экран сотруднику бара или сделать скриншот.';fileName=safeName(c);const b=await card(c);blobUrl=URL.createObjectURL(b);preview.src=blobUrl;statusText.textContent='Скачивание должно начаться автоматически. Если нет, нажмите кнопку ниже.';trigger()}
    download.addEventListener('click',trigger);window.addEventListener('pointerdown',()=>{if(!started)trigger()},{once:true});boot();
  </script>
</body>
</html>
