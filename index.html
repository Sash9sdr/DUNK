<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DUNK MENU</title>
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://s3.twcstorage.ru">
    <link rel="dns-prefetch" href="https://s3.twcstorage.ru">
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <link href="/index.css" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              menu: {
                bg: '#0a0a0a',
                card: '#121212',
                surface: '#1f1f1f',
                border: '#2a2a2a',
                text: '#ededed',
                muted: '#888888',
                accent: '#ffffff',
                highlight: 'rgb(var(--highlight-rgb) / <alpha-value>)', 
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Manrope', 'sans-serif'],
              pixel: ['"Press Start 2P"', 'cursive'],
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            }
          }
        }
      }
    </script>
    <style>
      /* Prevent initial white flash with dark theme */
      html, body { background-color: #050505; color: #ededed; }
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background-color: #050505;
        z-index: 9999;
      }
      /* Hardware acceleration hint for smooth scrolling */
      * { -webkit-overflow-scrolling: touch; }
    </style>
