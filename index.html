
<!DOCTYPE html>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <!-- Tailwind CDN with Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              menu: {
                bg: '#0a0a0a',
                card: '#121212',
                surface: '#1f1f1f',
                border: '#2a2a2a',
                text: '#ededed',
                muted: '#888888',
                accent: '#ffffff',
                highlight: 'rgb(var(--highlight-rgb) / <alpha-value>)', 
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Manrope', 'sans-serif'],
              pixel: ['"Press Start 2P"', 'cursive'],
            }
          }
        }

    <style>
      @tailwind base;
      @tailwind components;
      @tailwind utilities;

      :root { --highlight-rgb: 214 64 69; }
      body { 
        background-color: #050505; 
        color: #ededed; 
        -webkit-font-smoothing: antialiased; 
        overflow-x: hidden;
      }
      #root:empty::before { content: ""; position: fixed; inset: 0; background-color: #050505; z-index: 9999; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .mask-gradient-right {
        mask-image: linear-gradient(to right, black 85%, transparent 100%);
        -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
      }
      html { scroll-behavior: smooth; scroll-padding-top: 220px; }
      @keyframes special-blink {
        0%, 100% { color: rgba(255, 255, 255, 0.4); opacity: 0.7; }
        50% { color: #22c55e; opacity: 1; }
      }
      .animate-special-blink { animation: special-blink 2s infinite ease-in-out; }
    </style>
