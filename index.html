<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUNK MENU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              menu: {
                bg: '#0a0a0a',        /* Very dark, almost black */
                card: '#121212',      /* Slightly lighter for cards */
                surface: '#1f1f1f',   /* Interaction surfaces */
                border: '#2a2a2a',    /* Subtle borders */
                text: '#ededed',      /* High contrast text */
                muted: '#888888',     /* Secondary text */
                accent: '#ffffff',    /* Monochrome accent (white) */
                // DYNAMIC COLOR: Uses the CSS variable --highlight-rgb
                // This allows opacity modifiers: bg-menu-highlight/20
                highlight: 'rgb(var(--highlight-rgb) / <alpha-value>)', 
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Manrope', 'sans-serif'],
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Default DUNK RED in RGB format (214, 64, 69) */
        --highlight-rgb: 214 64 69;
      }

      body {
        background-color: #0a0a0a;
        color: #ededed;
        -webkit-font-smoothing: antialiased;
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      html {
        scroll-behavior: smooth;
        /* Adjusted to match the approximate height of the new compact fixed header */
        scroll-padding-top: 220px; 
      }
      
      ::selection {
        background: rgb(var(--highlight-rgb));
        color: white;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
